name: CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deploy/**'
      - 'hack/docker-compose.yml'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Build and push Docker images to GHCR ───────────────────────
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - aex-gateway
          - aex-work-publisher
          - aex-bid-gateway
          - aex-bid-evaluator
          - aex-contract-engine
          - aex-provider-registry
          - aex-trust-broker
          - aex-identity
          - aex-settlement
          - aex-telemetry
          - aex-certauth
          - aex-credentials-provider
          - aex-token-bank
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/
          file: src/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to staging (optional) ───────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Deploy with kustomize (dry-run)
        run: |
          echo "Would deploy to staging with image tag: ${{ env.IMAGE_TAG }}"
          echo "Registry: ${{ env.REGISTRY }}"
          echo ""
          echo "To enable real deployment:"
          echo "  1. Configure KUBECONFIG secret in GitHub"
          echo "  2. Uncomment kubectl apply below"
          echo "  3. Set up staging environment in GitHub settings"
          # kubectl apply -k deploy/k8s/overlays/staging
