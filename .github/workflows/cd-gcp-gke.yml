name: CD - GKE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: false
        type: boolean

env:
  GO_VERSION: "1.22"
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GKE_CLUSTER_REGION || 'us-central1' }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME || 'aex-cluster' }}
  ARTIFACT_REGISTRY: ${{ secrets.GKE_CLUSTER_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aex
  NAMESPACE: aex

jobs:
  # ============================================================
  # Build and Push Docker Images
  # ============================================================
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=sha-${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AEX core services
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REGISTRY=${{ env.ARTIFACT_REGISTRY }}

          services=(
            "aex-gateway"
            "aex-work-publisher"
            "aex-bid-gateway"
            "aex-bid-evaluator"
            "aex-contract-engine"
            "aex-provider-registry"
            "aex-trust-broker"
            "aex-identity"
            "aex-settlement"
            "aex-telemetry"
            "aex-credentials-provider"
          )

          for service in "${services[@]}"; do
            echo "::group::Building $service"
            docker build \
              -f "src/$service/Dockerfile" \
              -t "$REGISTRY/$service:$VERSION" \
              -t "$REGISTRY/$service:latest" \
              src/

            docker push "$REGISTRY/$service:$VERSION"
            docker push "$REGISTRY/$service:latest"
            echo "::endgroup::"
          done

      - name: Build and push code review demo agents
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REGISTRY=${{ env.ARTIFACT_REGISTRY }}

          agents=(
            "code-reviewer-a"
            "code-reviewer-b"
            "code-reviewer-c"
            "orchestrator"
            "payment-devpay"
            "payment-codeauditpay"
            "payment-securitypay"
          )

          for agent in "${agents[@]}"; do
            echo "::group::Building $agent"
            docker build \
              -f "demo/code_review/agents/Dockerfile" \
              --build-arg "AGENT_DIR=$agent" \
              -t "$REGISTRY/$agent:$VERSION" \
              -t "$REGISTRY/$agent:latest" \
              demo/code_review/agents/

            docker push "$REGISTRY/$agent:$VERSION"
            docker push "$REGISTRY/$agent:latest"
            echo "::endgroup::"
          done

      - name: Build and push demo UI
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REGISTRY=${{ env.ARTIFACT_REGISTRY }}

          echo "::group::Building demo-ui-nicegui"
          docker build \
            -f "demo/code_review/ui/Dockerfile" \
            -t "$REGISTRY/demo-ui-nicegui:$VERSION" \
            -t "$REGISTRY/demo-ui-nicegui:latest" \
            demo/code_review/ui/

          docker push "$REGISTRY/demo-ui-nicegui:$VERSION"
          docker push "$REGISTRY/demo-ui-nicegui:latest"
          echo "::endgroup::"

  # ============================================================
  # Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to GKE Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'staging' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GKE (Staging)
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          REGISTRY=${{ env.ARTIFACT_REGISTRY }}

          # Ensure namespace exists
          kubectl get namespace ${{ env.NAMESPACE }} || kubectl create namespace ${{ env.NAMESPACE }}

          # Apply manifests using kustomize with image overrides
          KUSTOMIZE_DIR="deploy/k8s/base"
          if [ -d "deploy/k8s/overlays/staging" ] && [ -f "deploy/k8s/overlays/staging/kustomization.yaml" ]; then
            KUSTOMIZE_DIR="deploy/k8s/overlays/staging"
          fi

          kubectl kustomize "$KUSTOMIZE_DIR" | \
            sed "s|\${REGISTRY}|$REGISTRY|g" | \
            sed "s|\${TAG}|$VERSION|g" | \
            kubectl apply -n ${{ env.NAMESPACE }} -f -

          # Wait for critical deployments
          echo "Waiting for deployments to be ready..."
          deployments=(
            "aex-gateway"
            "aex-work-publisher"
            "aex-provider-registry"
            "aex-bid-gateway"
            "aex-settlement"
          )

          for deploy in "${deployments[@]}"; do
            echo "Waiting for $deploy..."
            kubectl rollout status deployment/$deploy \
              -n ${{ env.NAMESPACE }} \
              --timeout=300s || true
          done

          echo ""
          echo "=== Staging Deployment Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }}

  # ============================================================
  # Smoke Tests
  # ============================================================
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event.inputs.skip_tests != 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against GKE staging..."

          # Get ingress IP
          INGRESS_IP=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

          if [ -z "$INGRESS_IP" ]; then
            echo "No ingress IP found. Using port-forward for tests..."

            # Port-forward gateway
            kubectl port-forward -n ${{ env.NAMESPACE }} svc/aex-gateway 8080:8080 &
            PF_PID=$!
            sleep 5

            GATEWAY_URL="http://localhost:8080"
          else
            GATEWAY_URL="http://$INGRESS_IP"
          fi

          # Health check
          echo "Testing gateway health..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$GATEWAY_URL/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Gateway health check: PASSED"
          else
            echo "Gateway health check: FAILED (HTTP $HTTP_CODE)"
            echo "Note: Gateway may still be starting up"
          fi

          # Check pod status
          echo ""
          echo "Pod status:"
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          # Check for crash loops
          CRASHES=$(kubectl get pods -n ${{ env.NAMESPACE }} --no-headers | grep -c "CrashLoopBackOff" || echo "0")
          if [ "$CRASHES" -gt "0" ]; then
            echo ""
            echo "WARNING: $CRASHES pod(s) in CrashLoopBackOff"
            kubectl get pods -n ${{ env.NAMESPACE }} | grep "CrashLoopBackOff"
          fi

          # Cleanup port-forward if used
          if [ -n "${PF_PID:-}" ]; then
            kill $PF_PID 2>/dev/null || true
          fi

          echo ""
          echo "Smoke tests completed"

  # ============================================================
  # Deploy to Production
  # ============================================================
  deploy-production:
    name: Deploy to GKE Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging, smoke-tests]
    if: github.event.inputs.environment == 'production' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GKE (Production)
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          REGISTRY=${{ env.ARTIFACT_REGISTRY }}

          # Ensure namespace exists
          kubectl get namespace ${{ env.NAMESPACE }} || kubectl create namespace ${{ env.NAMESPACE }}

          # Apply manifests using kustomize with image overrides
          KUSTOMIZE_DIR="deploy/k8s/base"
          if [ -d "deploy/k8s/overlays/production" ] && [ -f "deploy/k8s/overlays/production/kustomization.yaml" ]; then
            KUSTOMIZE_DIR="deploy/k8s/overlays/production"
          fi

          kubectl kustomize "$KUSTOMIZE_DIR" | \
            sed "s|\${REGISTRY}|$REGISTRY|g" | \
            sed "s|\${TAG}|$VERSION|g" | \
            kubectl apply -n ${{ env.NAMESPACE }} -f -

          # Wait for all deployments
          echo "Waiting for deployments to be ready..."
          kubectl get deployments -n ${{ env.NAMESPACE }} -o name | while read deploy; do
            echo "Waiting for $deploy..."
            kubectl rollout status $deploy \
              -n ${{ env.NAMESPACE }} \
              --timeout=600s || true
          done

          echo ""
          echo "=== Production Deployment Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo ""
          kubectl get svc -n ${{ env.NAMESPACE }}

      - name: Get service URLs
        run: |
          INGRESS_IP=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")

          echo "## GKE Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.build-and-push.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** ${{ env.GKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress IP:** $INGRESS_IP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n ${{ env.NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag} (GKE)`,
              body: `Automated release for ${tag}\n\nDeployed to GKE production cluster.`,
              draft: false,
              prerelease: false
            });
            console.log(`Created release: ${release.html_url}`);
