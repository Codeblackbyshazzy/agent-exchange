apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aex-ingress
  namespace: aex
  labels:
    app.kubernetes.io/name: aex-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: agent-exchange
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # WebSocket support for NiceGUI real-time UI
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # AEX Gateway API - all API traffic
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: aex-gateway
                port:
                  number: 8080
          # Demo UI - NiceGUI dashboard (default route)
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: demo-ui-nicegui
                port:
                  number: 8502
