apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-reviewer-b
  namespace: aex
  labels:
    app.kubernetes.io/name: code-reviewer-b
    app.kubernetes.io/component: code-review-agent
    app.kubernetes.io/part-of: agent-exchange
  annotations:
    description: "CodeGuard - Security-focused code review agent ($10 + $3/file)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-reviewer-b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-reviewer-b
        app.kubernetes.io/component: code-review-agent
        app.kubernetes.io/part-of: agent-exchange
    spec:
      containers:
        - name: code-reviewer-b
          image: ${REGISTRY}/code-review-code-reviewer-b:${TAG}
          ports:
            - containerPort: 8101
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: ANTHROPIC_API_KEY
            - name: AEX_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: AEX_GATEWAY_URL
            - name: AEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: AEX_API_KEY
            - name: AGENT_HOSTNAME
              value: "code-reviewer-b"
            - name: CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: CONFIG_PATH
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
