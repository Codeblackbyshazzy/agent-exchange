apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: aex
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/part-of: agent-exchange
  annotations:
    description: "Code Review Orchestrator - Workflow coordinator for review agents"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: orchestrator
        app.kubernetes.io/part-of: agent-exchange
    spec:
      containers:
        - name: orchestrator
          image: ${REGISTRY}/code-review-orchestrator:${TAG}
          ports:
            - containerPort: 8103
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: ANTHROPIC_API_KEY
            - name: AEX_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: AEX_GATEWAY_URL
            - name: AEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: AEX_API_KEY
            - name: CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: CONFIG_PATH
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
