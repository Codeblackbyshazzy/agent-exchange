apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-securitypay
  namespace: aex
  labels:
    app.kubernetes.io/name: payment-securitypay
    app.kubernetes.io/component: payment-agent
    app.kubernetes.io/part-of: agent-exchange
  annotations:
    description: "SecurityPay - Security specialist (3% fee, 4% reward = cashback)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-securitypay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-securitypay
        app.kubernetes.io/component: payment-agent
        app.kubernetes.io/part-of: agent-exchange
    spec:
      containers:
        - name: payment-securitypay
          image: ${REGISTRY}/code-review-payment-securitypay:${TAG}
          ports:
            - containerPort: 8202
              protocol: TCP
          env:
            - name: CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: CONFIG_PATH
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8202
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8202
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
