apiVersion: v1
kind: Secret
metadata:
  name: aex-secrets
  namespace: aex
  labels:
    app.kubernetes.io/part-of: agent-exchange
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values before deploying.
  # For production, use an external secrets manager (e.g., AWS Secrets Manager,
  # HashiCorp Vault, or Sealed Secrets) instead of storing secrets in manifests.

  # Anthropic API key for Claude-powered code review agents
  ANTHROPIC_API_KEY: "REPLACE_ME"

  # JWT signing key for aex-identity service
  JWT_SIGNING_KEY: "REPLACE_ME"

  # MongoDB credentials
  MONGO_USERNAME: "root"
  MONGO_PASSWORD: "root"

  # MongoDB connection URI (includes credentials)
  MONGO_URI: "mongodb://root:root@mongodb.aex.svc.cluster.local:27017/?authSource=admin"

  # AEX API key for agent authentication
  AEX_API_KEY: "dev-api-key"
