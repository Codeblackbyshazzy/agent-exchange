apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: aex
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: agent-exchange
spec:
  serviceName: mongodb
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: agent-exchange
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-replica-set
          image: mongo:7
          command:
            - bash
            - -c
            - |
              # Generate the replica set init script for the primary
              cat > /scripts/rs-init.js <<'SCRIPT'
              var cfg = {
                _id: "rs0",
                members: [
                  { _id: 0, host: "mongodb-0.mongodb.aex.svc.cluster.local:27017", priority: 2 },
                  { _id: 1, host: "mongodb-1.mongodb.aex.svc.cluster.local:27017", priority: 1 },
                  { _id: 2, host: "mongodb-2.mongodb.aex.svc.cluster.local:27017", priority: 1 }
                ]
              };
              try {
                rs.initiate(cfg);
              } catch (e) {
                if (e.codeName === "AlreadyInitialized") {
                  print("Replica set already initialized");
                } else {
                  throw e;
                }
              }
              SCRIPT
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
      containers:
        - name: mongodb
          image: mongo:7
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
            - --keyFile
            - /etc/mongo-keyfile/keyfile
          ports:
            - containerPort: 27017
              name: mongo
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: MONGO_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: MONGO_PASSWORD
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --eval "
                    try {
                      var status = rs.status();
                      var self = status.members.find(m => m.self);
                      if (self && (self.stateStr === 'PRIMARY' || self.stateStr === 'SECONDARY')) {
                        quit(0);
                      }
                      quit(1);
                    } catch(e) {
                      quit(1);
                    }
                  "
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: init-scripts
              mountPath: /scripts
              readOnly: true
            - name: mongo-keyfile
              mountPath: /etc/mongo-keyfile
              readOnly: true
      volumes:
        - name: init-scripts
          emptyDir: {}
        - name: mongo-keyfile
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/part-of: agent-exchange
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
