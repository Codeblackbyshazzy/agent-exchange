apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-backup
  namespace: aex
  labels:
    app.kubernetes.io/name: mongodb-backup
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: agent-exchange
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: aex
  labels:
    app.kubernetes.io/name: mongodb-backup
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: agent-exchange
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-backup
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: agent-exchange
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mongodb-backup
            app.kubernetes.io/component: database
            app.kubernetes.io/part-of: agent-exchange
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mongodump
              image: mongo:7
              command:
                - bash
                - -c
                - |
                  set -euo pipefail

                  BACKUP_DIR="/backups/$(date +%Y%m%d-%H%M%S)"
                  echo "Starting MongoDB backup to ${BACKUP_DIR}..."

                  mongodump \
                    --uri="mongodb://mongodb-0.mongodb.aex.svc.cluster.local:27017,mongodb-1.mongodb.aex.svc.cluster.local:27017,mongodb-2.mongodb.aex.svc.cluster.local:27017/?replicaSet=rs0" \
                    --username="${MONGO_USERNAME}" \
                    --password="${MONGO_PASSWORD}" \
                    --authenticationDatabase=admin \
                    --out="${BACKUP_DIR}" \
                    --gzip

                  echo "Backup completed: ${BACKUP_DIR}"

                  # Retain only the last 7 backups
                  echo "Pruning old backups (keeping last 7)..."
                  ls -dt /backups/*/ | tail -n +8 | xargs -r rm -rf

                  echo "Remaining backups:"
                  ls -lt /backups/
              env:
                - name: MONGO_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: aex-secrets
                      key: MONGO_USERNAME
                - name: MONGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: aex-secrets
                      key: MONGO_PASSWORD
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mongodb-backup
