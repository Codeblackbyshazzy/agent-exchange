apiVersion: apps/v1
kind: Deployment
metadata:
  name: aex-gateway
  namespace: aex
  labels:
    app.kubernetes.io/name: aex-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: agent-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aex-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aex-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: agent-exchange
    spec:
      containers:
        - name: aex-gateway
          image: ${REGISTRY}/aex-gateway:${TAG}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: IDENTITY_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: IDENTITY_URL
            - name: BID_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: BID_GATEWAY_URL
            - name: PROVIDER_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: PROVIDER_REGISTRY_URL
            - name: CONTRACT_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: CONTRACT_ENGINE_URL
            - name: TRUST_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: TRUST_BROKER_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
