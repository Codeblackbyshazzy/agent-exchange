apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: aex
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: agent-exchange
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
  ports:
    - port: 4222
      targetPort: 4222
      protocol: TCP
      name: client
    - port: 6222
      targetPort: 6222
      protocol: TCP
      name: cluster
    - port: 8222
      targetPort: 8222
      protocol: TCP
      name: monitoring
