apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: aex
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: agent-exchange
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: messaging
        app.kubernetes.io/part-of: agent-exchange
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nats
          image: nats:2-alpine
          args:
            - --name=$(POD_NAME)
            - --cluster_name=aex-nats
            - --js
            - --sd=/data/nats
            - --port=4222
            - --cluster=nats://0.0.0.0:6222
            - --http_port=8222
            - --routes=nats://nats-0.nats.aex.svc.cluster.local:6222,nats://nats-1.nats.aex.svc.cluster.local:6222,nats://nats-2.nats.aex.svc.cluster.local:6222
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 4222
              name: client
              protocol: TCP
            - containerPort: 6222
              name: cluster
              protocol: TCP
            - containerPort: 8222
              name: monitoring
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz?js-enabled-only=true
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: nats-data
              mountPath: /data/nats
  volumeClaimTemplates:
    - metadata:
        name: nats-data
        labels:
          app.kubernetes.io/name: nats
          app.kubernetes.io/part-of: agent-exchange
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
