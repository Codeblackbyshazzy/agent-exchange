apiVersion: apps/v1
kind: Deployment
metadata:
  name: aex-provider-registry
  namespace: aex
  labels:
    app.kubernetes.io/name: aex-provider-registry
    app.kubernetes.io/component: provider-registry
    app.kubernetes.io/part-of: agent-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aex-provider-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aex-provider-registry
        app.kubernetes.io/component: provider-registry
        app.kubernetes.io/part-of: agent-exchange
    spec:
      containers:
        - name: aex-provider-registry
          image: ${REGISTRY}/aex-provider-registry:${TAG}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: aex-secrets
                  key: MONGO_URI
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: MONGO_DB
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: aex-config
                  key: ENVIRONMENT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
