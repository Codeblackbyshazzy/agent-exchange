---
# HPA for aex-gateway (primary entry point - scale aggressively)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aex-gateway-hpa
  namespace: aex
  labels:
    app.kubernetes.io/name: aex-gateway
    app.kubernetes.io/part-of: agent-exchange
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aex-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
