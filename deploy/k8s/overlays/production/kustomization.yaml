apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay: HPA (2-10), larger resources, node affinity, ECR images
# Usage: kubectl apply -k deploy/k8s/overlays/production/

namespace: aex

resources:
  - ../../base
  # Production-specific resources
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

# Override images for production (ECR or your container registry)
images:
  # AEX Core Services
  - name: ${REGISTRY}/aex-gateway
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-gateway
    newTag: latest
  - name: ${REGISTRY}/aex-work-publisher
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-work-publisher
    newTag: latest
  - name: ${REGISTRY}/aex-bid-gateway
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-bid-gateway
    newTag: latest
  - name: ${REGISTRY}/aex-bid-evaluator
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-bid-evaluator
    newTag: latest
  - name: ${REGISTRY}/aex-contract-engine
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-contract-engine
    newTag: latest
  - name: ${REGISTRY}/aex-provider-registry
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-provider-registry
    newTag: latest
  - name: ${REGISTRY}/aex-trust-broker
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-trust-broker
    newTag: latest
  - name: ${REGISTRY}/aex-identity
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-identity
    newTag: latest
  - name: ${REGISTRY}/aex-settlement
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-settlement
    newTag: latest
  - name: ${REGISTRY}/aex-telemetry
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-telemetry
    newTag: latest
  - name: ${REGISTRY}/aex-credentials-provider
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/aex-credentials-provider
    newTag: latest
  # Demo Agents
  - name: ${REGISTRY}/code-review-code-reviewer-a
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-code-reviewer-a
    newTag: latest
  - name: ${REGISTRY}/code-review-code-reviewer-b
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-code-reviewer-b
    newTag: latest
  - name: ${REGISTRY}/code-review-code-reviewer-c
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-code-reviewer-c
    newTag: latest
  - name: ${REGISTRY}/code-review-orchestrator
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-orchestrator
    newTag: latest
  - name: ${REGISTRY}/code-review-payment-devpay
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-payment-devpay
    newTag: latest
  - name: ${REGISTRY}/code-review-payment-codeauditpay
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-payment-codeauditpay
    newTag: latest
  - name: ${REGISTRY}/code-review-payment-securitypay
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-payment-securitypay
    newTag: latest
  # UI
  - name: ${REGISTRY}/code-review-demo-ui-nicegui
    newName: YOUR_ACCOUNT.dkr.ecr.YOUR_REGION.amazonaws.com/code-review-demo-ui-nicegui
    newTag: latest

patches:
  # --- Production ConfigMap overrides ---
  - target:
      kind: ConfigMap
      name: aex-config
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: "production"
      - op: replace
        path: /data/NATS_STREAM_REPLICAS
        value: "3"

  # --- Production: 3 replicas for core services (HPA will manage scaling) ---
  - target:
      kind: Deployment
      name: aex-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: aex-work-publisher
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-bid-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-bid-evaluator
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-contract-engine
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-provider-registry
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-trust-broker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-identity
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-settlement
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-credentials-provider
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aex-telemetry
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  # --- Production: Larger resources for AEX services ---
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component in (gateway,work-publisher,bid-gateway,bid-evaluator,contract-engine,provider-registry,trust-broker,identity,settlement,telemetry,credentials-provider)
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  # --- Production: Larger resources for agents ---
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component in (code-review-agent,orchestrator,payment-agent,ui)
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  # --- Production: Larger MongoDB PVC and resources ---
  - target:
      kind: StatefulSet
      name: mongodb
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "10Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  # --- Production: Add node affinity to all pods ---
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: node-role.kubernetes.io/workload
                      operator: In
                      values:
                        - agent-exchange
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 50
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/part-of: agent-exchange
                  topologyKey: kubernetes.io/hostname

  # --- Production: TLS on Ingress ---
  - target:
      kind: Ingress
      name: aex-ingress
    patch: |
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - aex.example.com
            secretName: aex-tls-cert
      - op: add
        path: /spec/rules/0/host
        value: "aex.example.com"
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: "letsencrypt-prod"
