---
# PodDisruptionBudget for aex-gateway
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aex-gateway-pdb
  namespace: aex
  labels:
    app.kubernetes.io/name: aex-gateway
    app.kubernetes.io/part-of: agent-exchange
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aex-gateway
