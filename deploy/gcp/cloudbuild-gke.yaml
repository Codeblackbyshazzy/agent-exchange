# Cloud Build configuration for AEX services - GKE deployment
# Builds images, pushes to Artifact Registry, and deploys to GKE
#
# Usage:
#   gcloud builds submit --config=deploy/gcp/cloudbuild-gke.yaml \
#       --substitutions=_GKE_CLUSTER=aex-cluster,_GKE_REGION=us-central1 .

substitutions:
  _GKE_CLUSTER: aex-cluster
  _GKE_REGION: us-central1
  _GKE_NAMESPACE: aex
  _REGISTRY: ${_GKE_REGION}-docker.pkg.dev/${PROJECT_ID}/aex

steps:
  # ============================================================
  # Build AEX Core Services
  # ============================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: build-gateway
    args: ['build', '-t', '${_REGISTRY}/aex-gateway:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-gateway:latest', '-f', 'aex-gateway/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-work-publisher
    args: ['build', '-t', '${_REGISTRY}/aex-work-publisher:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-work-publisher:latest', '-f', 'aex-work-publisher/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-bid-gateway
    args: ['build', '-t', '${_REGISTRY}/aex-bid-gateway:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-bid-gateway:latest', '-f', 'aex-bid-gateway/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-bid-evaluator
    args: ['build', '-t', '${_REGISTRY}/aex-bid-evaluator:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-bid-evaluator:latest', '-f', 'aex-bid-evaluator/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-contract-engine
    args: ['build', '-t', '${_REGISTRY}/aex-contract-engine:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-contract-engine:latest', '-f', 'aex-contract-engine/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-provider-registry
    args: ['build', '-t', '${_REGISTRY}/aex-provider-registry:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-provider-registry:latest', '-f', 'aex-provider-registry/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-trust-broker
    args: ['build', '-t', '${_REGISTRY}/aex-trust-broker:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-trust-broker:latest', '-f', 'aex-trust-broker/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-identity
    args: ['build', '-t', '${_REGISTRY}/aex-identity:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-identity:latest', '-f', 'aex-identity/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-settlement
    args: ['build', '-t', '${_REGISTRY}/aex-settlement:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-settlement:latest', '-f', 'aex-settlement/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-telemetry
    args: ['build', '-t', '${_REGISTRY}/aex-telemetry:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-telemetry:latest', '-f', 'aex-telemetry/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-credentials-provider
    args: ['build', '-t', '${_REGISTRY}/aex-credentials-provider:${COMMIT_SHA}', '-t', '${_REGISTRY}/aex-credentials-provider:latest', '-f', 'aex-credentials-provider/Dockerfile', '.']
    dir: 'src'
    waitFor: ['-']

  # ============================================================
  # Build Code Review Demo Agents
  # ============================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: build-code-reviewer-a
    args: ['build', '-t', '${_REGISTRY}/code-reviewer-a:${COMMIT_SHA}', '-t', '${_REGISTRY}/code-reviewer-a:latest', '--build-arg', 'AGENT_DIR=code-reviewer-a', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-code-reviewer-b
    args: ['build', '-t', '${_REGISTRY}/code-reviewer-b:${COMMIT_SHA}', '-t', '${_REGISTRY}/code-reviewer-b:latest', '--build-arg', 'AGENT_DIR=code-reviewer-b', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-code-reviewer-c
    args: ['build', '-t', '${_REGISTRY}/code-reviewer-c:${COMMIT_SHA}', '-t', '${_REGISTRY}/code-reviewer-c:latest', '--build-arg', 'AGENT_DIR=code-reviewer-c', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-orchestrator
    args: ['build', '-t', '${_REGISTRY}/orchestrator:${COMMIT_SHA}', '-t', '${_REGISTRY}/orchestrator:latest', '--build-arg', 'AGENT_DIR=orchestrator', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  # ============================================================
  # Build Payment Agents
  # ============================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: build-payment-devpay
    args: ['build', '-t', '${_REGISTRY}/payment-devpay:${COMMIT_SHA}', '-t', '${_REGISTRY}/payment-devpay:latest', '--build-arg', 'AGENT_DIR=payment-devpay', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-payment-codeauditpay
    args: ['build', '-t', '${_REGISTRY}/payment-codeauditpay:${COMMIT_SHA}', '-t', '${_REGISTRY}/payment-codeauditpay:latest', '--build-arg', 'AGENT_DIR=payment-codeauditpay', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-payment-securitypay
    args: ['build', '-t', '${_REGISTRY}/payment-securitypay:${COMMIT_SHA}', '-t', '${_REGISTRY}/payment-securitypay:latest', '--build-arg', 'AGENT_DIR=payment-securitypay', '-f', 'demo/code_review/agents/Dockerfile', 'demo/code_review/agents']
    waitFor: ['-']

  # ============================================================
  # Build Demo UI
  # ============================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: build-demo-ui-nicegui
    args: ['build', '-t', '${_REGISTRY}/demo-ui-nicegui:${COMMIT_SHA}', '-t', '${_REGISTRY}/demo-ui-nicegui:latest', '-f', 'demo/code_review/ui/Dockerfile', 'demo/code_review/ui']
    waitFor: ['-']

  # ============================================================
  # Push All Images
  # ============================================================

  # AEX Core
  - name: 'gcr.io/cloud-builders/docker'
    id: push-core
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        services="aex-gateway aex-work-publisher aex-bid-gateway aex-bid-evaluator aex-contract-engine aex-provider-registry aex-trust-broker aex-identity aex-settlement aex-telemetry aex-credentials-provider"
        for svc in $services; do
          docker push "${_REGISTRY}/$svc:${COMMIT_SHA}"
          docker push "${_REGISTRY}/$svc:latest"
        done
    waitFor:
      - build-gateway
      - build-work-publisher
      - build-bid-gateway
      - build-bid-evaluator
      - build-contract-engine
      - build-provider-registry
      - build-trust-broker
      - build-identity
      - build-settlement
      - build-telemetry
      - build-credentials-provider

  # Demo agents and UI
  - name: 'gcr.io/cloud-builders/docker'
    id: push-demo
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        agents="code-reviewer-a code-reviewer-b code-reviewer-c orchestrator payment-devpay payment-codeauditpay payment-securitypay demo-ui-nicegui"
        for agent in $agents; do
          docker push "${_REGISTRY}/$agent:${COMMIT_SHA}"
          docker push "${_REGISTRY}/$agent:latest"
        done
    waitFor:
      - build-code-reviewer-a
      - build-code-reviewer-b
      - build-code-reviewer-c
      - build-orchestrator
      - build-payment-devpay
      - build-payment-codeauditpay
      - build-payment-securitypay
      - build-demo-ui-nicegui

  # ============================================================
  # Deploy to GKE
  # ============================================================

  # Get GKE credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    id: get-credentials
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - '${_GKE_CLUSTER}'
      - '--region=${_GKE_REGION}'
      - '--project=${PROJECT_ID}'
    waitFor:
      - push-core
      - push-demo

  # Apply K8s manifests with image substitution
  - name: 'gcr.io/cloud-builders/kubectl'
    id: deploy-manifests
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Ensure namespace exists
        kubectl get namespace ${_GKE_NAMESPACE} || kubectl create namespace ${_GKE_NAMESPACE}

        # Apply Kustomize manifests with image overrides
        kubectl kustomize deploy/k8s/base/ | \
          sed "s|\$${REGISTRY}|${_REGISTRY}|g" | \
          sed "s|\$${TAG}|${COMMIT_SHA}|g" | \
          kubectl apply -n ${_GKE_NAMESPACE} -f -

        echo "Waiting for rollout..."
        # Wait for critical deployments
        for deploy in aex-gateway aex-work-publisher aex-provider-registry; do
          kubectl rollout status deployment/$deploy -n ${_GKE_NAMESPACE} --timeout=300s || true
        done

        echo ""
        echo "=== Deployment Status ==="
        kubectl get pods -n ${_GKE_NAMESPACE}
        echo ""
        kubectl get svc -n ${_GKE_NAMESPACE}
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_GKE_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}'
    waitFor:
      - get-credentials

images:
  # AEX Core
  - '${_REGISTRY}/aex-gateway:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-work-publisher:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-bid-gateway:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-bid-evaluator:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-contract-engine:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-provider-registry:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-trust-broker:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-identity:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-settlement:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-telemetry:${COMMIT_SHA}'
  - '${_REGISTRY}/aex-credentials-provider:${COMMIT_SHA}'
  # Code Review Demo
  - '${_REGISTRY}/code-reviewer-a:${COMMIT_SHA}'
  - '${_REGISTRY}/code-reviewer-b:${COMMIT_SHA}'
  - '${_REGISTRY}/code-reviewer-c:${COMMIT_SHA}'
  - '${_REGISTRY}/orchestrator:${COMMIT_SHA}'
  # Payment Agents
  - '${_REGISTRY}/payment-devpay:${COMMIT_SHA}'
  - '${_REGISTRY}/payment-codeauditpay:${COMMIT_SHA}'
  - '${_REGISTRY}/payment-securitypay:${COMMIT_SHA}'
  # Demo UI
  - '${_REGISTRY}/demo-ui-nicegui:${COMMIT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '2400s'
